name: Price Monitor

on:
  schedule:
    # Every 30 minutes, Monday-Friday UTC. Covers A-share hours and gold's main weekday sessions.
    - cron: "*/30 * * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor script
        env:
          MAIL_HOST: smtp.qq.com
          MAIL_PORT: "465"
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          RECEIVER: ${{ secrets.RECEIVER }}
        run: python monitor.py

      - name: Save notification state
        run: |
          if [ -f .monitor-state.json ] && [ -n "$(git status --porcelain -- .monitor-state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .monitor-state.json
            git commit -m "Update stock notification state"
            git push origin HEAD:main
          fi
