name: A-Share Stock Monitor

on:
  schedule:
    # UTC 01:30-07:00, Monday-Friday. Beijing time: 09:30-15:00.
    - cron: "30 1 * * 1-5"
    - cron: "0,30 2-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor script
        env:
          MAIL_HOST: smtp.qq.com
          MAIL_PORT: "465"
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          RECEIVER: ${{ secrets.RECEIVER }}
        run: python monitor.py

      - name: Save notification state
        run: |
          if [ -f .monitor-state.json ] && [ -n "$(git status --porcelain -- .monitor-state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .monitor-state.json
            git commit -m "Update stock notification state"
            git push
          fi
